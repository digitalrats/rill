[package]
name = "rill-router"
version = "0.6.0-M1"
edition = "2021"
description = "Signal routing, mixing, and equalization for Rill"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-router"

[dependencies]
rill-core = { workspace = true }
rill-core-dsp = { workspace = true }
rill-graph = { workspace = true, optional = true }
rill-lang = { workspace = true, optional = true }
thiserror = "1.0"

[features]
default = []
graph = ["rill-graph"]
lang = ["rill-lang"]

[dev-dependencies]
float-cmp = "0.9"