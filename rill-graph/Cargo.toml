[package]
name = "rill-graph"
version = "0.5.0"
edition = "2021"
description = "Real-time signal graph with block processing"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-graph"

[dependencies]
rill-core = { workspace = true }
rill-core-actor = { workspace = true }
rill-lang = { version = "0.5", path = "../rill-lang" }
indexmap = "2"

log = "0.4"

serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
serde_cbor = { version = "0.11", optional = true }

[dev-dependencies]

[features]
default = []
serialization = ["dep:serde", "dep:serde_json", "dep:serde_cbor", "rill-core/serde"]
