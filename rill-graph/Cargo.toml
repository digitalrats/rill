[package]
name = "rill-graph"
version = "0.4.0"
edition = "2021"
description = "Real-time audio graph with block processing"
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
rill-core = { workspace = true }
crossbeam-channel = "0.5"

log = "0.4"

serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
serde_cbor = { version = "0.11", optional = true }

[dev-dependencies]
rill-core-dsp = { workspace = true }
rill-patchbay = { workspace = true }

[features]
default = []
serialization = ["dep:serde", "dep:serde_json", "dep:serde_cbor", "rill-core/serde"]
dot = []
