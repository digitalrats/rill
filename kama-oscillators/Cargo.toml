[package]
name = "kama-oscillators"
version = "0.1.0"
edition = "2021"
description = "Unified oscillators for Kama Audio - audio oscillators, LFOs, envelopes, and control generators"
license = "MIT OR Apache-2.0"

[dependencies]
kama-core-traits = { path = "../kama-core-traits" }
kama-dsp-common = { path = "../kama-dsp-common" }
kama-signal = { path = "../kama-signal", optional = true }
rand = "0.8"
thiserror = "1.0"

[features]
default = []
sync = ["kama-signal"]  # для синхронизированных генераторов

[dev-dependencies]
float-cmp = "0.9"