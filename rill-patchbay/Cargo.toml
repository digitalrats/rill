[package]
name = "rill-patchbay"
version = "0.5.0-beta.4"
edition = "2021"
description = "The world where Automata live - control system for Rill"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-patchbay"

[dependencies]
rill-core = { workspace = true }
rill-core-actor = { workspace = true }
rill-io = { workspace = true, optional = true }
parking_lot = "0.12"
thiserror = "1.0"
rand = "0.8"
log = "0.4"
tokio = { workspace = true, features = ["time", "sync", "rt", "macros"] }
serde = { version = "1.0", optional = true, features = ["derive"] }
serde_json = { version = "1.0", optional = true }
serde_cbor = { version = "0.11", optional = true }

[features]
default = []
serde = ["dep:serde", "rill-core/serde"]
json = ["serde", "dep:serde_json"]
cbor = ["serde", "dep:serde_cbor"]
serialization = ["json", "cbor"]
midi = ["dep:rill-io"]

[dev-dependencies]
float-cmp = "0.9"
