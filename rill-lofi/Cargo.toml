[package]
name = "rill-lofi"
version = "0.5.0-beta.3"
edition = "2021"
description = "Lo-fi audio emulation: 8-bit, 12-bit, NES, AY-3-8910, Akai S900"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-lofi"

[dependencies]
rill-core = { workspace = true }
rand = "0.8"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }

[features]
default = []

[dev-dependencies]
serde_json = "1.0"