[package]
name = "rill-digital-filters"
version = "0.6.0-M1"
edition = "2021"
description = "Digital filters for Rill - Biquad, OnePole, StateVariable, etc."
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-digital-filters"

[dependencies]
rill-core = { workspace = true }
rill-core-dsp = { workspace = true }
rill-graph = { workspace = true, optional = true }
thiserror = "1.0"

[features]
default = []
graph = ["rill-graph"]

[dev-dependencies]
float-cmp = "0.9"