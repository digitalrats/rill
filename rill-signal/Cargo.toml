[package]
name = "rill-signal"
version = "0.2.0"
edition = "2021"
description = "Signal bus system for Rill"
license = "Apache-2.0"
authors = ["Digital Rats / Rill Team"]

[dependencies]
crossbeam-channel = "0.5"
parking_lot = "0.12"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
# Для примеров не нужны дополнительные зависимости

[features]
default = []
serde = ["dep:serde"]

[[example]]
name = "basic_signal_bus"
path = "examples/basic_signal_bus.rs"

[[example]]
name = "multiple_signal_types"
path = "examples/multiple_signal_types.rs"

[[example]]
name = "signal_dispatcher"
path = "examples/signal_dispatcher.rs"

[[example]]
name = "bus_with_policies"
path = "examples/bus_with_policies.rs"