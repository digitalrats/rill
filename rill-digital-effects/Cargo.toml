[package]
name = "rill-digital-effects"
version = "0.5.0"
edition = "2021"
description = "Digital signal effects for Rill - Delay, Distortion, Chorus, Reverb, etc."
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-digital-effects"

[dependencies]
rill-core = { workspace = true }
rill-core-dsp = { workspace = true }
rill-graph = { workspace = true, optional = true }
thiserror = "1.0"

[features]
default = []
graph = ["rill-graph"]

[dev-dependencies]
float-cmp = "0.9"