[package]
name = "kama-automation"
version = "0.1.0"
edition = "2021"
description = "Advanced automation system for Kama Audio"
license = "MIT OR Apache-2.0"

[dependencies]
kama-core = { path = "../kama-core", version = "0.1.0" }
parking_lot = "0.12"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }

