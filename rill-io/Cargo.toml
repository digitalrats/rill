[package]
name = "rill-io"
version = "0.4.0"
edition = "2021"
description = "Audio I/O backends for Rill - CPAL, ALSA, PipeWire, JACK"
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
rill-core = { workspace = true }
thiserror = "1.0"
parking_lot = "0.12"
log = "0.4"
crossbeam-channel = "0.5"

cpal = { version = "0.15", optional = true }
alsa = { version = "0.9", optional = true }
pipewire = { version = "0.9", optional = true }
jack = { version = "0.10", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
float-cmp = "0.9"
rill-graph = { workspace = true }
rill-core-dsp = { workspace = true }

[features]
default = ["cpal"]

cpal = ["dep:cpal"]
alsa = ["dep:alsa"]
pipewire = ["dep:pipewire"]
jack = ["dep:jack"]
all-backends = ["cpal", "alsa", "pipewire", "jack"]
serde-config = ["dep:serde"]
