[package]
name = "rill-io"
version = "0.5.0-beta.6"
edition = "2021"
description = "Audio I/O backends for Rill - CPAL, ALSA, PipeWire, JACK"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-io"

[dependencies]
rill-core = { workspace = true }
thiserror = "1.0"
log = "0.4"

portaudio = { version = "0.8", optional = true }
alsa = { version = "0.9", optional = true }
midir = { version = "0.11", optional = true }
bytemuck = "1"
pipewire = { version = "0.9", optional = true }
jack = { version = "0.10", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
float-cmp = "0.9"

[features]
default = ["portaudio", "midir"]

portaudio = ["dep:portaudio"]
alsa = ["dep:alsa"]
midir = ["dep:midir"]
pipewire = ["dep:pipewire"]
jack = ["dep:jack"]
all-backends = ["portaudio", "alsa", "midir", "pipewire", "jack"]
serde-config = ["dep:serde"]
