[package]
name = "rill-core-dsp"
version = "0.6.0-M1"
edition = "2021"
description = "Core DSP abstractions and algorithms for Rill"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-core-dsp"

[dependencies]
rill-core = { workspace = true }
num-traits = "0.2"
num-complex = "0.4"
thiserror = "1.0"

[dev-dependencies]
float-cmp = "0.9"
criterion = { workspace = true, features = ["html_reports"] }

[[bench]]
name = "oscillator_bench"
harness = false
path = "benches/oscillator_bench.rs"

[[bench]]
name = "filter_bench"
harness = false
path = "benches/filter_bench.rs"

[[bench]]
name = "noise_bench"
harness = false
path = "benches/noise_bench.rs"

[[bench]]
name = "reader_bench"
harness = false
path = "benches/reader_bench.rs"

[[bench]]
name = "conv_direct_bench"
harness = false
path = "benches/conv_direct_bench.rs"

[features]
default = []
simd = ["rill-core/simd"]  # SIMD оптимизации через rill-core
f64 = []                   # Включить поддержку f64
fast_math = []             # Быстрые приближённые математические функции (меньшая точность)
