[package]
name = "rill-core-dsp"
version = "0.3.0"
edition = "2021"
description = "Core DSP abstractions and algorithms for Rill"
license = "Apache-2.0"
authors = ["Digital Rats / Rill Team"]

[dependencies]
rill-core = { path = "../rill-core", version = "0.3.0" }
num-traits = "0.2"
num-complex = "0.4"
float-cmp = "0.9"
thiserror = "1.0"

[dev-dependencies]
# Зависимости только для тестов
float-cmp = "0.9"        # Уже указано выше, но можно оставить для ясности

[features]
default = []
simd = ["rill-core/simd"]  # SIMD оптимизации через rill-core
f64 = []                   # Включить поддержку f64
fast_math = []             # Быстрые приближённые математические функции (меньшая точность)
unstable = []              # Нестабильные фичи (generic_const_exprs)