[package]
name = "rill-core-dsp"
version = "0.5.0-beta.2"
edition = "2021"
description = "Core DSP abstractions and algorithms for Rill"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-core-dsp"

[dependencies]
rill-core = { workspace = true }
num-traits = "0.2"
num-complex = "0.4"
thiserror = "1.0"

[dev-dependencies]
float-cmp = "0.9"

[features]
default = []
simd = ["rill-core/simd"]  # SIMD оптимизации через rill-core
f64 = []                   # Включить поддержку f64
fast_math = []             # Быстрые приближённые математические функции (меньшая точность)
