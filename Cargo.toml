[workspace]
members = [
    "kama-core-traits",
    "kama-core",
    "kama-buffers",
    "kama-graph",
    "kama-automation",
    "kama-control",
    "kama-signal",
    "kama-dsp-common",
    "kama-hp",
    "kama-lofi",
    "kama-digital-filters",
    "kama-eq",
    "kama-mixer", 
    "kama-digital-effects",
    # "kama-wdf"        # временно отключаем
    "kama-io",
    "kama-tests",
]
resolver = "2"

[workspace.package]
license = "Apache-2.0"
authors = ["Digital Rats / Kama Audio Team"]
edition = "2021"

[workspace.dependencies]
parking_lot = "0.12"
num-traits = "0.2"
thiserror = "1.0"
async-trait = "0.1"
