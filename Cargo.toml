[workspace]
members = [
    "rill-core",
    "rill-core-dsp",
    "rill-graph",
    "rill-patchbay",
    "rill-oscillators",
    "rill-digital-filters",
    "rill-digital-effects",
    "rill-router",
    "rill-lofi",
    #"rill-io", # Временно отключен 
    #"rill-server" # В разработке
    #"rill-wdf" # Планируется
    #"rill-sequenser # Планируется
]
resolver = "2"

[workspace.package]
license = "Apache-2.0"
authors = ["Digital Rats / Rill Team"]
edition = "2021"

[workspace.dependencies]
parking_lot = "0.12"
num-traits = "0.2"
thiserror = "1.0"
async-trait = "0.1"
serde = "1.0"
rand = "0.8"
log = "0.4"
crossbeam-channel = "0.5"
tokio = "1.0"