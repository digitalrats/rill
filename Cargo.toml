[workspace]
members = [
    "kama-core",
    "kama-buffers",
    "kama-graph",
    "kama-automation",
    "kama-control",
    "kama-dsp-common",
    "kama-oscillators",
    "kama-digital-filters",
    "kama-digital-effects",
    "kama-eq",
    "kama-mixer",
    "kama-lofi",
    "kama-hp",
    "kama-io",
    "kama-tests",
]
resolver = "2"

[workspace.package]
license = "Apache-2.0"
authors = ["Digital Rats / Kama Audio Team"]
edition = "2021"

[workspace.dependencies]
parking_lot = "0.12"
num-traits = "0.2"
thiserror = "1.0"
async-trait = "0.1"
serde = "1.0"  # убрали optional
rand = "0.8"
log = "0.4"
crossbeam-channel = "0.5"
tokio = "1.0"