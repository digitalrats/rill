[package]
name = "rill-core"
version = "0.5.0-beta.7"
edition = "2021"
description = "Core foundation for the Rill ecosystem — traits, math, buffers, queues, time, macros"
license.workspace = true
authors.workspace = true
repository.workspace = true
documentation = "https://docs.rs/rill-core"

[dependencies]
parking_lot = "0.12"
thiserror = "1.0"
rand = "0.8"
wide = { version = "0.7", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
float-cmp = "0.9"
criterion = { workspace = true, features = ["html_reports"] }

[[bench]]
name = "vector_bench"
harness = false
path = "benches/vector_bench.rs"

[[bench]]
name = "alignment_bench"
harness = false
path = "benches/alignment_bench.rs"

[features]
default = []
serde = ["dep:serde"]
simd = ["wide"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]