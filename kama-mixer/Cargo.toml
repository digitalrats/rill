[package]
name = "kama-mixer"
version = "0.2.0"
edition = "2021"
description = "Advanced mixing and routing extensions for Kama Audio - reactive mixer, buses, complex filters"
license = "MIT OR Apache-2.0"

[dependencies]
kama-core = { path = "../kama-core", version = "0.1.0" }
serde = { version = "1.0", features = ["derive"] }
parking_lot = "0.12"

# Опциональные зависимости для реактивной функциональности
tokio = { version = "1.0", features = ["full"], optional = true }
futures = { version = "0.3", optional = true }
either = { version = "1.9", optional = true }

[features]
default = ["reactive"]
reactive = ["tokio", "futures", "either"]
complex-filters = []
buses = ["either"]

[dev-dependencies]
# Зависимости для тестов - не опциональные
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"